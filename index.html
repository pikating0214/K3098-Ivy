<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Treasure Hunt Grammar Quest</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #25313d;
      --muted: #5b6b78;
      --sand: #fff4cf;
      --paper: #fffdf5;
      --panel: #ffffff;
      --sea: #1d7b9b;
      --leaf: #2f8a58;
      --gold: #f4b63e;
      --coral: #d9584b;
      --ruby: #c73559;
      --line: #d9cda4;
      --good: #287d55;
      --bad: #a8443d;
      --shadow: 0 16px 38px rgba(48, 42, 22, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 8%, rgba(255, 255, 255, 0.8) 0 7%, transparent 8%),
        linear-gradient(180deg, #87d7e5 0, #bfeadc 260px, var(--sand) 261px, #fffbec 100%);
      overflow-x: hidden;
    }

    button {
      font: inherit;
    }

    .shell {
      width: min(1120px, calc(100% - 24px));
      margin: 0 auto;
      padding: 20px 0 44px;
    }

    .hero {
      position: relative;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 18px;
      align-items: center;
      padding: 22px;
      border: 2px solid rgba(132, 91, 38, 0.24);
      border-radius: 8px;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.92), rgba(255, 249, 219, 0.92)),
        repeating-linear-gradient(45deg, transparent 0 28px, rgba(244, 182, 62, 0.11) 29px 31px);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .hero::after {
      content: "";
      position: absolute;
      right: -42px;
      bottom: -54px;
      width: 230px;
      height: 170px;
      border-radius: 50%;
      background: rgba(29, 123, 155, 0.13);
      transform: rotate(-12deg);
    }

    h1 {
      position: relative;
      z-index: 1;
      margin: 0;
      font-size: clamp(2rem, 5vw, 4rem);
      line-height: 1.02;
      letter-spacing: 0;
    }

    .intro {
      position: relative;
      z-index: 1;
      max-width: 720px;
      margin: 10px 0 0;
      color: var(--muted);
      font-size: clamp(1rem, 2.3vw, 1.2rem);
      line-height: 1.45;
    }

    .treasureBox {
      position: relative;
      z-index: 1;
      display: grid;
      place-items: center;
      width: min(230px, 34vw);
      min-width: 150px;
      aspect-ratio: 1.18;
      padding: 12px;
      border-radius: 8px;
      background: #f9e8ad;
      border: 2px solid rgba(132, 91, 38, 0.28);
    }

    .chest {
      position: relative;
      width: 130px;
      height: 94px;
      filter: drop-shadow(0 10px 10px rgba(79, 49, 10, 0.18));
    }

    .chestLid {
      position: absolute;
      left: 8px;
      top: 4px;
      width: 114px;
      height: 44px;
      border-radius: 48px 48px 8px 8px;
      background: linear-gradient(#9b5a25, #6c3818);
      border: 4px solid #3f2413;
      transform-origin: bottom left;
      transition: transform 0.55s ease;
    }

    .chest.open .chestLid {
      transform: rotate(-18deg) translateY(-18px);
    }

    .chestBody {
      position: absolute;
      left: 0;
      bottom: 0;
      width: 130px;
      height: 64px;
      border-radius: 8px;
      background: linear-gradient(90deg, #7a3e1a, #b96b28 48%, #7a3e1a);
      border: 4px solid #3f2413;
      overflow: hidden;
    }

    .chestBody::before,
    .chestBody::after {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      width: 14px;
      background: #f0bc46;
    }

    .chestBody::before {
      left: 24px;
    }

    .chestBody::after {
      right: 24px;
    }

    .lock {
      position: absolute;
      left: 50%;
      bottom: 24px;
      width: 28px;
      height: 30px;
      border-radius: 6px;
      background: #f6c64d;
      border: 3px solid #593716;
      transform: translateX(-50%);
      z-index: 2;
    }

    .gemCount {
      margin: 8px 0 0;
      font-weight: 800;
      color: #5f3b15;
      text-align: center;
    }

    .mapPath {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin: 18px 0;
    }

    .mapStep {
      min-height: 70px;
      padding: 10px;
      border: 2px solid rgba(47, 138, 88, 0.28);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.82);
      color: var(--muted);
      font-weight: 800;
      text-align: center;
    }

    .mapIcon {
      display: block;
      font-size: 1.6rem;
      margin-bottom: 4px;
    }

    .level {
      margin-top: 18px;
      border: 2px solid rgba(132, 91, 38, 0.22);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .levelHead {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      padding: 16px;
      background:
        linear-gradient(90deg, rgba(47, 138, 88, 0.13), rgba(244, 182, 62, 0.16)),
        #fffaf0;
      border-bottom: 2px dashed rgba(132, 91, 38, 0.22);
    }

    .levelTitle {
      margin: 0;
      font-size: clamp(1.25rem, 3vw, 1.8rem);
      line-height: 1.12;
    }

    .levelRule {
      margin: 6px 0 0;
      color: var(--muted);
      line-height: 1.35;
    }

    .choice,
    .reset {
      border: 0;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
    }

    .reset {
      min-height: 44px;
      padding: 10px 14px;
      color: white;
      background: var(--sea);
      box-shadow: 0 8px 18px rgba(29, 123, 155, 0.18);
      font-weight: 800;
    }

    .choice:active,
    .reset:active {
      transform: translateY(1px);
    }

    .scene {
      display: grid;
      grid-template-columns: minmax(220px, 0.72fr) minmax(0, 1fr);
      gap: 16px;
      padding: 16px;
      background: #fffdf6;
    }

    .scene.questionsOnly {
      grid-template-columns: 1fr;
    }

    .picturePanel {
      min-height: 320px;
      border: 2px solid rgba(29, 123, 155, 0.18);
      border-radius: 8px;
      background:
        radial-gradient(circle at 24% 18%, rgba(255,255,255,0.8) 0 8%, transparent 9%),
        linear-gradient(180deg, #bce9f0 0 48%, #f7de99 49% 100%);
      overflow: hidden;
      position: relative;
    }

    .islandArt {
      position: absolute;
      inset: 0;
    }

    .sun {
      position: absolute;
      top: 24px;
      right: 26px;
      width: 58px;
      height: 58px;
      border-radius: 50%;
      background: #ffd35d;
      box-shadow: 0 0 0 12px rgba(255, 211, 93, 0.18);
    }

    .palm {
      position: absolute;
      left: 24px;
      bottom: 62px;
      font-size: 5rem;
      transform: rotate(-8deg);
    }

    .boat {
      position: absolute;
      right: 18px;
      bottom: 76px;
      font-size: 4.5rem;
    }

    .clueGrid {
      position: absolute;
      left: 18px;
      right: 18px;
      bottom: 16px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .clue {
      min-height: 58px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.82);
      border: 2px solid rgba(132, 91, 38, 0.14);
      font-size: 2rem;
    }

    .questions {
      display: grid;
      gap: 12px;
    }

    .card {
      border: 2px solid rgba(217, 205, 164, 0.9);
      border-radius: 8px;
      background: #ffffff;
      padding: 12px;
    }

    .cardTop {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 10px;
      align-items: center;
    }

    .miniPic {
      width: 58px;
      height: 58px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: #fff1bd;
      border: 2px solid rgba(244, 182, 62, 0.45);
      font-size: 2rem;
      flex: 0 0 auto;
    }

    .question {
      margin: 0;
      font-weight: 900;
      font-size: clamp(1rem, 2.8vw, 1.28rem);
      line-height: 1.22;
    }

    .choices {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-top: 10px;
    }

    .choice {
      min-height: 48px;
      padding: 10px;
      color: var(--ink);
      background: #f7fbfd;
      border: 2px solid #d8e7eb;
      font-weight: 900;
      text-align: center;
    }

    .choice:hover {
      background: #eef9fb;
    }

    .questionShot {
      display: block;
      width: 100%;
      max-height: 190px;
      object-fit: contain;
      margin-bottom: 10px;
      border: 2px solid rgba(29, 123, 155, 0.16);
      border-radius: 8px;
      background: #ffffff;
    }

    .matchBoard {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .matchColumn {
      display: grid;
      gap: 10px;
      align-content: start;
    }

    .matchLabel {
      margin: 0;
      color: var(--muted);
      font-weight: 900;
      text-align: center;
    }

    .matchCard {
      min-height: 58px;
      padding: 10px;
      border: 2px solid #d8e7eb;
      border-radius: 8px;
      background: #f7fbfd;
      color: var(--ink);
      cursor: pointer;
      font-size: clamp(1.05rem, 3vw, 1.35rem);
      font-weight: 900;
      text-align: center;
      transition: transform 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
    }

    .matchCard:active {
      transform: translateY(1px);
    }

    .matchCard.selected {
      border-color: var(--gold);
      background: #fff1bd;
      box-shadow: 0 0 0 4px rgba(244, 182, 62, 0.18);
    }

    .matchCard.correct {
      color: #ffffff;
      background: var(--good);
      border-color: var(--good);
    }

    .matchCard.wrong {
      color: #ffffff;
      background: var(--bad);
      border-color: var(--bad);
    }

    .choice.correct {
      color: white;
      background: var(--good);
      border-color: var(--good);
    }

    .choice.wrong {
      color: white;
      background: var(--bad);
      border-color: var(--bad);
    }

    .feedback {
      min-height: 20px;
      margin: 8px 0 0;
      color: var(--muted);
      font-weight: 800;
      line-height: 1.28;
    }

    .feedback.good {
      color: var(--good);
    }

    .feedback.try {
      color: var(--bad);
    }

    .gemFly {
      position: fixed;
      z-index: 20;
      width: 30px;
      height: 30px;
      display: grid;
      place-items: center;
      pointer-events: none;
      animation: flyGem 760ms cubic-bezier(.18,.82,.22,1) forwards;
    }

    .spark {
      position: fixed;
      z-index: 19;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #fff2a5;
      pointer-events: none;
      animation: sparkle 520ms ease-out forwards;
    }

    .complete {
      display: none;
      margin-top: 18px;
      padding: 22px;
      text-align: center;
      border: 2px solid rgba(132, 91, 38, 0.22);
      border-radius: 8px;
      background: #fffef7;
      box-shadow: var(--shadow);
    }

    .complete.show {
      display: block;
    }

    .complete h2 {
      margin: 0 0 8px;
      font-size: clamp(1.5rem, 4vw, 2.3rem);
    }

    .coins {
      font-size: 2.2rem;
      animation: bounceCoins 1s ease-in-out infinite;
    }

    @keyframes flyGem {
      0% {
        transform: translate(0, 0) scale(0.72) rotate(0deg);
        opacity: 0;
      }
      15% {
        opacity: 1;
      }
      100% {
        transform: translate(var(--gem-x), var(--gem-y)) scale(1.18) rotate(360deg);
        opacity: 0;
      }
    }

    @keyframes sparkle {
      0% {
        transform: translate(0, 0) scale(0.8);
        opacity: 1;
      }
      100% {
        transform: translate(var(--spark-x), var(--spark-y)) scale(0);
        opacity: 0;
      }
    }

    @keyframes bounceCoins {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    @media (max-width: 860px) {
      .hero,
      .scene,
      .levelHead {
        grid-template-columns: 1fr;
      }

      .treasureBox {
        width: 100%;
      }

      .mapPath {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .picturePanel {
        min-height: 260px;
      }
    }

    @media (max-width: 520px) {
      .shell {
        width: min(100% - 16px, 1120px);
        padding-top: 10px;
      }

      .hero,
      .scene,
      .levelHead {
        padding: 12px;
      }

      .mapPath {
        grid-template-columns: 1fr;
      }

      .cardTop {
        grid-template-columns: auto minmax(0, 1fr);
      }

      .choices {
        grid-template-columns: 1fr;
      }

      .matchBoard {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero" aria-label="Treasure hunt introduction">
      <div>
        <h1>Treasure Hunt Grammar Quest</h1>
        <p class="intro">Find words, choose answers, and collect 22 gems to open the treasure chest.</p>
      </div>
      <div class="treasureBox" id="treasureTarget" aria-label="Treasure progress">
        <div class="chest" id="chest">
          <div class="chestLid"></div>
          <div class="chestBody"></div>
          <div class="lock"></div>
        </div>
        <div class="gemCount"><span id="gemCount">0</span>/<span id="totalCount">22</span> gems</div>
      </div>
    </section>

    <section class="mapPath" aria-label="Map steps">
      <div class="mapStep"><span class="mapIcon">🧭</span>Find the Word</div>
      <div class="mapStep"><span class="mapIcon">🗺️</span>Magic Map</div>
      <div class="mapStep"><span class="mapIcon">🌉</span>River Bridge</div>
      <div class="mapStep"><span class="mapIcon">⛰️</span>Treasure Cave</div>
    </section>

    <section id="levels"></section>

    <section class="complete" id="completeBox" aria-live="polite">
      <div class="coins">💎 🪙 💎</div>
      <h2>You found the treasure!</h2>
      <p>Great job! You finished all 22 grammar clues.</p>
      <button class="reset" type="button" id="resetBtn">Play Again</button>
    </section>
  </main>

  <script>
    const levels = [
      {
        title: "Level 1: Find the Word",
        rule: "Match the same treasure words.",
        imageType: "words",
        matchItems: [
          { id: "m1", word: "am", audio: "am. I am a girl." },
          { id: "m2", word: "is", audio: "is. She is a girl." },
          { id: "m3", word: "are", audio: "are. They are cats." },
          { id: "m4", word: "my", audio: "my. This is my ball." },
          { id: "m5", word: "your", audio: "your. This is your teddy bear." },
          { id: "m6", word: "do", audio: "do. Do they eat ice cream?" },
          { id: "m7", word: "does", audio: "does. Does he play soccer?" }
        ]
      },
      {
        title: "Level 2: Magic Map",
        rule: "Choose am, is, or are.",
        imageType: "island",
        questions: [
          { id: "q1", icon: "👧", text: "I ___ a girl.", choices: ["am", "is", "are"], answer: "am", complete: "I am a girl." },
          { id: "q2", icon: "👧", text: "She ___ a girl.", choices: ["am", "is", "are"], answer: "is", complete: "She is a girl." },
          { id: "q3", icon: "👨‍⚕️", text: "He ___ a doctor.", choices: ["am", "is", "are"], answer: "is", complete: "He is a doctor." },
          { id: "q4", icon: "🐶", text: "It ___ a dog.", choices: ["am", "is", "are"], answer: "is", complete: "It is a dog." },
          { id: "q5", icon: "🐱", text: "They ___ cats.", choices: ["am", "is", "are"], answer: "are", complete: "They are cats." },
          { id: "q6", icon: "👫", text: "We ___ friends.", choices: ["am", "is", "are"], answer: "are", complete: "We are friends." }
        ]
      },
      {
        title: "Level 3: River Bridge",
        rule: "Choose Do or Does.",
        imageType: "bridge",
        questions: [
          { id: "q7", icon: "⚽", text: "___ he play soccer?", choices: ["Do", "Does"], answer: "Does", complete: "Does he play soccer?" },
          { id: "q8", icon: "📖", text: "___ she read a book?", choices: ["Do", "Does"], answer: "Does", complete: "Does she read a book?" },
          { id: "q9", icon: "🍦", text: "___ they eat ice cream?", choices: ["Do", "Does"], answer: "Do", complete: "Do they eat ice cream?" },
          { id: "q10", icon: "🏫", text: "___ we go to school?", choices: ["Do", "Does"], answer: "Do", complete: "Do we go to school?" }
        ]
      },
      {
        title: "Level 4: Treasure Cave",
        rule: "Mixed review. Find the last gems.",
        imageType: "cave",
        questions: [
          { id: "q11", icon: "👩‍🏫", text: "You ___ my teacher.", choices: ["am", "is", "are"], answer: "are", complete: "You are my teacher." },
          { id: "q12", icon: "🐱", text: "The cat ___ on the mat.", choices: ["am", "is", "are"], answer: "is", complete: "The cat is on the mat." },
          { id: "q13", icon: "🐶", text: "___ the dog bark?", choices: ["Do", "Does"], answer: "Does", complete: "Does the dog bark?" },
          { id: "q14", icon: "🏈", text: "___ you play football?", choices: ["Do", "Does"], answer: "Do", complete: "Do you play football?" },
          { id: "q15", icon: "😊", text: "I ___ happy today.", choices: ["am", "is", "are"], answer: "am", complete: "I am happy today." }
        ]
      }
    ];

    const answered = new Set();
    const levelsEl = document.querySelector("#levels");
    const gemCountEl = document.querySelector("#gemCount");
    const totalCountEl = document.querySelector("#totalCount");
    const treasureTarget = document.querySelector("#treasureTarget");
    const chestEl = document.querySelector("#chest");
    const completeBox = document.querySelector("#completeBox");
    const totalQuestions = levels.reduce((sum, level) => {
      return sum + (level.questions?.length || 0) + (level.matchItems?.length || 0);
    }, 0);
    let audioContext;
    let selectedMatch = null;

    function speak(text) {
      if (!("speechSynthesis" in window)) {
        alert("This browser does not support question audio.");
        return;
      }

      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      const voices = window.speechSynthesis.getVoices();
      const preferred = voices.find((voice) =>
        /Samantha|Karen|Google US English|Microsoft Aria|Microsoft Jenny/i.test(voice.name)
      );

      if (preferred) utterance.voice = preferred;
      utterance.lang = "en-US";
      utterance.rate = 0.86;
      utterance.pitch = 1.06;
      window.speechSynthesis.speak(utterance);
    }

    function playGemSound() {
      const AudioCtx = window.AudioContext || window.webkitAudioContext;
      if (!AudioCtx) return;
      audioContext = audioContext || new AudioCtx();
      const now = audioContext.currentTime;
      const gain = audioContext.createGain();
      gain.gain.setValueAtTime(0.001, now);
      gain.gain.exponentialRampToValueAtTime(0.18, now + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.34);
      gain.connect(audioContext.destination);

      [740, 980, 1240].forEach((freq, index) => {
        const osc = audioContext.createOscillator();
        osc.type = "sine";
        osc.frequency.setValueAtTime(freq, now + index * 0.055);
        osc.connect(gain);
        osc.start(now + index * 0.055);
        osc.stop(now + 0.32 + index * 0.04);
      });
    }

    function playWinSound() {
      const AudioCtx = window.AudioContext || window.webkitAudioContext;
      if (!AudioCtx) return;
      audioContext = audioContext || new AudioCtx();
      const now = audioContext.currentTime;
      const gain = audioContext.createGain();
      gain.gain.setValueAtTime(0.001, now);
      gain.gain.exponentialRampToValueAtTime(0.16, now + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.9);
      gain.connect(audioContext.destination);

      [523, 659, 784, 1047].forEach((freq, index) => {
        const osc = audioContext.createOscillator();
        osc.type = "triangle";
        osc.frequency.setValueAtTime(freq, now + index * 0.13);
        osc.connect(gain);
        osc.start(now + index * 0.13);
        osc.stop(now + 0.26 + index * 0.13);
      });
    }

    function makeSparks(x, y) {
      for (let i = 0; i < 9; i += 1) {
        const spark = document.createElement("span");
        spark.className = "spark";
        spark.style.left = `${x}px`;
        spark.style.top = `${y}px`;
        spark.style.setProperty("--spark-x", `${Math.cos(i) * (26 + i * 4)}px`);
        spark.style.setProperty("--spark-y", `${Math.sin(i) * (26 + i * 4)}px`);
        document.body.appendChild(spark);
        spark.addEventListener("animationend", () => spark.remove());
      }
    }

    function flyGem(fromEl) {
      const start = fromEl.getBoundingClientRect();
      const end = treasureTarget.getBoundingClientRect();
      const gem = document.createElement("span");
      gem.className = "gemFly";
      gem.textContent = "💎";
      const startX = start.left + start.width / 2;
      const startY = start.top + start.height / 2;
      const endX = end.left + end.width / 2;
      const endY = end.top + end.height / 2;
      gem.style.left = `${startX}px`;
      gem.style.top = `${startY}px`;
      gem.style.setProperty("--gem-x", `${endX - startX}px`);
      gem.style.setProperty("--gem-y", `${endY - startY}px`);
      document.body.appendChild(gem);
      makeSparks(startX, startY);
      gem.addEventListener("animationend", () => {
        makeSparks(endX, endY);
        gem.remove();
      });
    }

    function updateProgress() {
      gemCountEl.textContent = answered.size;
      totalCountEl.textContent = totalQuestions;
      const isDone = answered.size === totalQuestions;
      chestEl.classList.toggle("open", isDone);
      completeBox.classList.toggle("show", isDone);
    }

    function chooseAnswer(question, card, button) {
      const choices = card.querySelectorAll(".choice");
      const feedback = card.querySelector(".feedback");
      choices.forEach((choice) => choice.classList.remove("correct", "wrong"));

      if (button.dataset.choice === question.answer) {
        button.classList.add("correct");
        feedback.textContent = "Gem collected!";
        feedback.className = "feedback good";
        speak(`${question.answer}. ${question.complete}`);
        answered.add(question.id);
        choices.forEach((choice) => {
          choice.disabled = true;
          if (choice !== button) choice.style.opacity = "0.6";
        });
        flyGem(button);
        setTimeout(playGemSound, 650);
        const wasLast = answered.size === totalQuestions;
        updateProgress();
        if (wasLast) playWinSound();
      } else {
        button.classList.add("wrong");
        feedback.textContent = "Look at the picture and try again.";
        feedback.className = "feedback try";
      }
    }

    function chooseMatch(side, item, button, board) {
      if (button.classList.contains("correct")) return;

      if (side === "left") {
        board.querySelectorAll(".matchCard[data-side='left']").forEach((card) => card.classList.remove("selected"));
        selectedMatch = { item, button };
        button.classList.add("selected");
        return;
      }

      if (!selectedMatch) {
        button.classList.add("wrong");
        setTimeout(() => button.classList.remove("wrong"), 360);
        return;
      }

      if (selectedMatch.item.word === item.word) {
        button.classList.add("correct");
        selectedMatch.button.classList.remove("selected");
        selectedMatch.button.classList.add("correct");
        answered.add(item.id);
        speak(item.audio);
        flyGem(button);
        setTimeout(playGemSound, 650);
        const wasLast = answered.size === totalQuestions;
        updateProgress();
        if (wasLast) playWinSound();
      } else {
        const wrongLeft = selectedMatch.button;
        button.classList.add("wrong");
        wrongLeft.classList.add("wrong");
        setTimeout(() => {
          button.classList.remove("wrong");
          wrongLeft.classList.remove("wrong", "selected");
          if (selectedMatch?.button === wrongLeft) selectedMatch = null;
        }, 480);
        return;
      }

      selectedMatch = null;
    }

    function renderPicture(type) {
      if (type === "toys") {
        return "";
      }

      const icons = type === "bridge"
        ? ["⚽", "📖", "🍦", "🏫", "🌉", "💎"]
        : type === "cave"
          ? ["👩‍🏫", "🐱", "🐶", "🏈", "😊", "🪙"]
          : type === "words"
            ? ["am", "is", "are", "my", "your", "do", "does", "💎"]
          : ["👧", "👨‍⚕️", "🐶", "🐱", "👫", "💎"];

      return `
        <div class="picturePanel">
          <div class="islandArt" aria-hidden="true">
            <div class="sun"></div>
            <div class="palm">🌴</div>
            <div class="boat">${type === "cave" ? "⛰️" : type === "bridge" ? "🌉" : "⛵"}</div>
            <div class="clueGrid">
              ${icons.map((icon) => `<div class="clue">${icon}</div>`).join("")}
            </div>
          </div>
        </div>
      `;
    }

    function renderMatching(level) {
      const board = document.createElement("div");
      board.className = "matchBoard";
      const leftItems = [...level.matchItems];
      const rightItems = [level.matchItems[2], level.matchItems[5], level.matchItems[0], level.matchItems[6], level.matchItems[1], level.matchItems[4], level.matchItems[3]];

      board.innerHTML = `
        <div class="matchColumn">
          <p class="matchLabel">Treasure Words</p>
        </div>
        <div class="matchColumn">
          <p class="matchLabel">Find the Match</p>
        </div>
      `;

      const leftColumn = board.children[0];
      const rightColumn = board.children[1];

      leftItems.forEach((item) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "matchCard";
        button.dataset.side = "left";
        button.textContent = item.word;
        button.addEventListener("click", () => chooseMatch("left", item, button, board));
        leftColumn.appendChild(button);
      });

      rightItems.forEach((item) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "matchCard";
        button.dataset.side = "right";
        button.textContent = item.word;
        button.addEventListener("click", () => chooseMatch("right", item, button, board));
        rightColumn.appendChild(button);
      });

      return board;
    }

    function renderQuestion(question) {
      const card = document.createElement("article");
      card.className = "card";
      card.innerHTML = `
        ${question.image ? `<img class="questionShot" src="${question.image}" alt="">` : ""}
        <div class="cardTop">
          <div class="miniPic" aria-hidden="true">${question.icon}</div>
          <p class="question">${question.text}</p>
        </div>
        <div class="choices"></div>
        <p class="feedback" aria-live="polite"></p>
      `;

      const choicesEl = card.querySelector(".choices");
      question.choices.forEach((choice) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "choice";
        button.textContent = choice;
        button.dataset.choice = choice;
        button.addEventListener("click", () => chooseAnswer(question, card, button));
        choicesEl.appendChild(button);
      });
      return card;
    }

    function renderLevels() {
      levelsEl.innerHTML = "";
      levels.forEach((level) => {
        const section = document.createElement("section");
        section.className = "level";
        section.innerHTML = `
          <div class="levelHead">
            <div>
              <h2 class="levelTitle">${level.title}</h2>
              <p class="levelRule">${level.rule}</p>
            </div>
          </div>
          <div class="scene ${level.imageType === "toys" ? "questionsOnly" : ""}">
            ${renderPicture(level.imageType)}
            <div class="questions"></div>
          </div>
        `;

        const questionsEl = section.querySelector(".questions");
        if (level.matchItems) {
          questionsEl.appendChild(renderMatching(level));
        } else {
          level.questions.forEach((question) => questionsEl.appendChild(renderQuestion(question)));
        }
        levelsEl.appendChild(section);
      });
    }

    document.querySelector("#resetBtn").addEventListener("click", () => {
      answered.clear();
      selectedMatch = null;
      renderLevels();
      updateProgress();
      window.scrollTo({ top: 0, behavior: "smooth" });
    });

    window.speechSynthesis?.addEventListener?.("voiceschanged", () => {});
    renderLevels();
    updateProgress();
  </script>
</body>
</html>
